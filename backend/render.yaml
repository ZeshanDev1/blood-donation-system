# Render Blueprint for the QBDS backend API.
# Deploy: push to GitHub, then in Render → "New +" → "Blueprint" and point at this repo.
# Render will read this file (set the root directory to `backend` if the blueprint
# is detected from the repo root, or place this file at the repo root and adjust paths).
services:
  - type: web
    name: qbds-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    # Images are stored on Cloudinary (see CLOUDINARY_URL), so no persistent
    # disk is required — the free instance type works fine.
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_URL
        sync: false
